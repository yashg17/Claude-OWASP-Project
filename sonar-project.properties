sonar.projectKey=parent-portal
sonar.projectName=Parent Portal Security Scan
sonar.projectVersion=1.0

sonar.sources=.
sonar.language=py
sonar.sourceEncoding=UTF-8
sonar.python.version=3.11

sonar.exclusions=**/__pycache__/**,**/*.pyc,**/venv/**,**/.venv/**,**/docs/**,**/.env*,**/scripts/**

sonar.coverage.exclusions=**/scripts/**

# Quality Gate — uses the one named "Parent Portal Gate" you create in SonarQube
sonar.qualitygate.wait=true
